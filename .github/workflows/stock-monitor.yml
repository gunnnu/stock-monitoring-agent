name: Indian Stock Monitor

on:
  schedule:
    # NSE trading hours are 09:15–15:30 IST (Mon–Fri) = 03:45–10:00 UTC.
    # Cron runs in UTC. We check mid-session and shortly after the close.
    # (Note: GitHub-hosted cron can be delayed during peak load.)
    - cron: "30 5 * * 1-5"    # ~11:00 IST  (mid-morning check)
    - cron: "30 9 * * 1-5"    # ~15:00 IST  (pre-close check)
    - cron: "15 10 * * 1-5"   # ~15:45 IST  (post-close daily signals)
  workflow_dispatch:           # allow manual runs from the Actions tab

# Avoid overlapping runs if a previous one is still going.
concurrency:
  group: stock-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run stock monitor
        env:
          # Email (SMTP) — configure as repository secrets if you want email alerts
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          # Telegram — configure as repository secrets if you want Telegram alerts
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m src.main
